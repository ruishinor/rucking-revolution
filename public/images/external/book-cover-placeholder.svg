<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1400" role="img" aria-labelledby="title desc">
  <title id="title">Book cover placeholder</title>
  <desc id="desc">A branded placeholder cover used when a recommended reading cover image is not available locally.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#F3EEE4" />
      <stop offset="100%" stop-color="#DDD0BC" />
    </linearGradient>
  </defs>
  <rect width="900" height="1400" rx="48" fill="url(#bg)" />
  <rect x="72" y="72" width="756" height="1256" rx="32" fill="#FFFDF8" stroke="#D8CEBF" stroke-width="8" />
  <rect x="120" y="120" width="660" height="148" rx="22" fill="#172023" />
  <text x="156" y="205" fill="#FFF9F1" font-family="Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="8">RECOMMENDED READING</text>
  <text x="120" y="484" fill="#8A1E1E" font-family="Arial, sans-serif" font-size="92" font-weight="800">Cover Image</text>
  <text x="120" y="584" fill="#172023" font-family="Arial, sans-serif" font-size="92" font-weight="800">Unavailable</text>
  <text x="120" y="678" fill="#5E463C" font-family="Georgia, serif" font-size="30">A local fallback cover will be added when source artwork is available.</text>
  <path d="M180 860h540" stroke="#8A1E1E" stroke-width="18" stroke-linecap="round" />
  <path d="M180 952h540" stroke="#8A1E1E" stroke-width="18" stroke-linecap="round" />
  <path d="M180 1044h320" stroke="#8A1E1E" stroke-width="18" stroke-linecap="round" />
</svg>
