  <text x="200" y="174" fill="#BB6A3A" font-family="Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="5">CONSISTENCY</text>
  <text x="200" y="332" fill="#172023" font-family="Arial, sans-serif" font-size="82" font-weight="700">What If I</text>
  <text x="200" y="420" fill="#172023" font-family="Arial, sans-serif" font-size="82" font-weight="700">Miss a Day?</text>
  <text x="200" y="518" fill="#2F4B3C" font-family="Georgia, serif" font-size="42">One missed session is not the problem.</text>
  <text x="200" y="574" fill="#2F4B3C" font-family="Georgia, serif" font-size="42">The real skill is learning how to return quickly.</text>
  <text x="200" y="686" fill="#172023" font-family="Courier New, monospace" font-size="26" font-weight="700" letter-spacing="4">DO NOT MISS TWICE IF YOU CAN HELP IT.</text>
