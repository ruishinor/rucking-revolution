  <g transform="translate(40 708)" font-family="Archivo, sans-serif" font-weight="700" letter-spacing="-2" fill="#11161a">
    <text y="0" font-size="34">Start a Ruck </text>
    <text x="198" y="0" font-size="34" fill="#8a1e1e">Club.</text>
  </g>
  <g transform="translate(40 734)" font-family="Source Serif 4, serif" font-style="italic" font-size="14" fill="#4f5a63">
    <text>A field manual for organising a walking community.</text>
  </g>

  
  <g transform="translate(40 772)">
    <text font-family="IBM Plex Mono, monospace" font-size="11" letter-spacing="3" fill="#4f5a63">ALEXANDER</text>
    <text x="480" text-anchor="end" font-family="IBM Plex Mono, monospace" font-size="11" letter-spacing="3" fill="#4f5a63">RUCKING REVOLUTION</text>
