<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  
  <rect width="1600" height="900" fill="#eef2f4"></rect>

  
  <g opacity="0.5" stroke="#c9d3da" stroke-width="1">
    <line x1="120" y1="760" x2="1480" y2="760"></line>
    <line x1="120" y1="820" x2="1480" y2="820"></line>
  </g>

  
  <g transform="translate(120 150)">
    <text font-family="IBM Plex Mono, monospace" font-size="22" letter-spacing="5" fill="#8a1e1e">LOAD / TRAINING · 002</text>
    <g font-family="Archivo, sans-serif" font-weight="700" letter-spacing="-4">
      <text y="140" font-size="128" fill="#11161a">HOW MUCH</text>
      <text y="268" font-size="128" fill="#8a1e1e">WEIGHT</text>
      <text y="396" font-size="128" fill="#11161a">SHOULD YOU CARRY?</text>
    </g>
  </g>

  
  <g transform="translate(120 560)">
    
    <rect x="0" y="50" width="1360" height="14" fill="#11161a"></rect>
    
    <g>
      <g transform="translate(80 0)">
        <rect x="-4" y="30" width="8" height="60" fill="#11161a"></rect>
        <text x="0" y="130" text-anchor="middle" font-family="Archivo, sans-serif" font-weight="700" font-size="36" fill="#11161a">5 LB</text>
        <text x="0" y="160" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="3" fill="#4f5a63">WEEK 01</text>
      </g>
      <g transform="translate(420 0)">
        <rect x="-6" y="20" width="12" height="80" fill="#11161a"></rect>
        <text x="0" y="130" text-anchor="middle" font-family="Archivo, sans-serif" font-weight="700" font-size="36" fill="#11161a">10 LB</text>
        <text x="0" y="160" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="3" fill="#4f5a63">WEEK 02–03</text>
      </g>
      <g transform="translate(820 0)">
        <rect x="-8" y="0" width="16" height="100" fill="#8a1e1e"></rect>
        <text x="0" y="130" text-anchor="middle" font-family="Archivo, sans-serif" font-weight="700" font-size="44" fill="#8a1e1e">20 LB</text>
        <text x="0" y="160" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="3" fill="#8a1e1e">TARGET · WEEK 04+</text>
      </g>
      <g transform="translate(1240 0)" opacity="0.45">
        <rect x="-6" y="-20" width="12" height="120" fill="#667684"></rect>
        <text x="0" y="130" text-anchor="middle" font-family="Archivo, sans-serif" font-weight="700" font-size="36" fill="#667684">30+</text>
        <text x="0" y="160" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="3" fill="#667684">ADVANCED</text>
      </g>
    </g>
    
    <g transform="translate(80 0)">
      <polygon points="0,0 -14,-24 14,-24" fill="#c44c28"></polygon>
      <text x="0" y="-34" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="3" fill="#c44c28">START HERE</text>
    </g>
  </g>

  
  <g transform="translate(120 820)">
    <line x1="0" y1="0" x2="180" y2="0" stroke="#8a1e1e" stroke-width="3"></line>
    <text y="34" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="3" fill="#11161a">START LIGHT. PROGRESS IS THE WORK.</text>
  </g>
</svg>