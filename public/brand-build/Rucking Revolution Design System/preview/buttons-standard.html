<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{padding:24px;background:#eef2f4}.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.eye{font-family:"IBM Plex Mono",monospace;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:#8a1e1e;margin:0 0 10px}
.meta{font-family:"IBM Plex Mono",monospace;font-size:.66rem;color:#4f5a63;letter-spacing:.08em;margin-left:8px}
</style></head><body>
<div class="eye">Buttons — Standard (.rr-btn)</div>
<div class="row">
  <a class="rr-btn rr-btn--primary">READ ARTICLE</a>
  <a class="rr-btn rr-btn--secondary">VIEW LIBRARY</a>
  <a class="rr-btn rr-btn--utility">Download PDF</a>
</div>
<div class="row">
  <a class="rr-btn rr-btn--primary" style="padding:.7rem 1rem;font-size:.875rem">SM</a>
  <a class="rr-btn rr-btn--primary" style="padding:.9rem 1.35rem">MD</a>
  <a class="rr-btn rr-btn--primary" style="padding:1rem 1.6rem;font-size:1.05rem">LG</a>
  <span class="meta">3 sizes · sm / md / lg · weight 700</span>
</div>
</body></html>
