<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:#eef2f4}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .sw{border-radius:10px;padding:12px;min-height:150px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid #c9d3da}
  .tag{font-family:"IBM Plex Mono",monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#4f5a63}
  .name{font-family:"Archivo",sans-serif;font-weight:700;font-size:.85rem;letter-spacing:-0.02em;color:#11161a}
  .val{font-family:"IBM Plex Mono",monospace;font-size:.7rem;font-weight:700;color:#4f5a63}
</style></head>
<body>
<div class="grid">
  <div class="sw" style="background:#eef2f4"><span class="tag">Background</span><div><div class="name">Mineral Paper</div><span class="val">#EEF2F4</span></div></div>
  <div class="sw" style="background:#f7f9fa"><span class="tag">Surface</span><div><div class="name">Surface</div><span class="val">#F7F9FA</span></div></div>
  <div class="sw" style="background:#e1e7eb"><span class="tag">Panel</span><div><div class="name">Panel</div><span class="val">#E1E7EB</span></div></div>
  <div class="sw" style="background:#c9d3da"><span class="tag">Border / 200</span><div><div class="name">Border</div><span class="val">#C9D3DA</span></div></div>
  <div class="sw" style="background:#a8b5c2"><span class="tag">Muted 300</span><div><div class="name">Muted 300</div><span class="val">#A8B5C2</span></div></div>
  <div class="sw" style="background:#4f5a63"><span class="tag" style="color:#c9d3da">Muted</span><div><div class="name" style="color:#fff">Muted</div><span class="val" style="color:#c9d3da">#4F5A63</span></div></div>
  <div class="sw" style="background:#11161a"><span class="tag" style="color:#a8b5c2">Foreground</span><div><div class="name" style="color:#fff">Foreground</div><span class="val" style="color:#a8b5c2">#11161A</span></div></div>
</div>
</body></html>
