<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#eef2f4}
.strip{background:#11161a;padding:32px 40px;border-bottom:4px solid #8a1e1e}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;text-align:center}
.v{font-family:"Archivo",sans-serif;font-weight:700;font-size:1.3rem;color:#fff;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.02em}
.l{font-family:"IBM Plex Mono",monospace;font-size:.7rem;letter-spacing:.12em;color:#a8b5c2;text-transform:uppercase}
</style></head><body>
<div class="strip"><div class="grid">
  <div><span class="v">Field-Tested</span><span class="l">Methods proven in real life</span></div>
  <div><span class="v">Crew-Built</span><span class="l">By active ruck leaders</span></div>
  <div><span class="v">Individual → Community</span><span class="l">A proven pathway</span></div>
</div></div>
</body></html>
