<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:#eef2f4}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{border-radius:12px;padding:14px;color:#fff;display:flex;flex-direction:column;gap:8px;min-height:200px;justify-content:space-between;border:1px solid rgba(0,0,0,.05)}
  .sw .tag{font-family:"IBM Plex Mono",monospace;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;opacity:.9}
  .sw .val{font-family:"IBM Plex Mono",monospace;font-size:.78rem;font-weight:700}
  .sw .name{font-family:"Archivo",sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:-0.02em}
  .dark{color:#11161a}
</style></head>
<body>
<div class="grid">
  <div class="sw" style="background:#8a1e1e"><span class="tag">Primary</span><div><div class="name">Rucker Red</div><span class="val">#8A1E1E</span></div></div>
  <div class="sw" style="background:#651515"><span class="tag">Primary Dark</span><div><div class="name">Rucker Dark</div><span class="val">#651515</span></div></div>
  <div class="sw" style="background:#11161a"><span class="tag">Secondary</span><div><div class="name">Charcoal</div><span class="val">#11161A</span></div></div>
  <div class="sw" style="background:#c44c28"><span class="tag">Accent</span><div><div class="name">Activation</div><span class="val">#C44C28</span></div></div>
  <div class="sw" style="background:#32443c"><span class="tag">Forest</span><div><div class="name">Forest</div><span class="val">#32443C</span></div></div>
  <div class="sw" style="background:#667684"><span class="tag">Steel</span><div><div class="name">Steel</div><span class="val">#667684</span></div></div>
</div>
</body></html>
