name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (fail on moderate+)
        run: npm audit --audit-level=moderate

      - name: Contrast checks
        run: npm run check-contrast

      - name: Run tests
        run: npx vitest run
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build
    
    - name: Install ChromeDriver for axe
      if: always()
      run: npx browser-driver-manager install chrome

    - name: Start preview server
      if: always()
      run: |
        npm run preview -- --host 0.0.0.0 --port 4173 >/tmp/astro-preview.log 2>&1 &
        for i in {1..20}; do
          if curl -sSf http://localhost:4173 > /dev/null; then
            echo "Preview server is up"
            break
          fi
          sleep 1
        done
    
    - name: Run accessibility checks
      if: always()
      run: npx axe http://localhost:4173 --tags wcag2a,wcag2aa

    - name: Stop preview server
      if: always()
      run: |
        lsof -ti:4173 | xargs -r kill
